<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoGlide | Login</title>
  <link rel="icon" href="images/logo.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; transition: background 0.3s, color 0.3s; }
    [data-theme="dark"] body { background-color: #000000; color: #ffffff; }
    [data-theme="dark"] .auth-card { background-color: #0a0a0a; border-color: #27272a; }
    [data-theme="dark"] input { background-color: #18181b; border-color: #27272a; color: #ffffff; }
    [data-theme="dark"] .btn-social { background-color: #18181b; border-color: #27272a; }
    [data-theme="dark"] .btn-social:hover { background-color: #27272a; }
    [data-theme="dark"] .theme-btn { background-color: #18181b !important; border-color: #27272a !important; color: #ffffff !important; }
    [data-theme="dark"] .text-slate-900 { color: #ffffff !important; }
    [data-theme="dark"] .title { color: #ffffff !important; }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen flex flex-col items-center justify-center p-6 relative">

  <!-- Floating Controls -->
  <div class="w-full max-w-md flex justify-end gap-3 mb-4">
    <button onclick="toggleTheme()" class="theme-btn bg-white border border-zinc-200 p-3 rounded-xl shadow-sm hover:scale-105 transition"> <i class="themeIcon bi bi-moon-stars-fill"></i></button>
    <button onclick="toggleRTL()" class="theme-btn bg-white border border-zinc-200 p-3 rounded-xl shadow-sm hover:scale-105 transition"> <i class="bi bi-arrow-left-right"></i></button>
  </div>

  <div class="auth-card bg-white p-6 sm:p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-zinc-100 w-full max-w-md">
    
    <!-- Brand Name / Logo -->
    <div class="text-center mb-8">
      <h1 class="text-2xl text-slate-900 font-bold tracking-tight">
        <a href="index.html">
          ECO<span class="title text-[#10B981] font-bold">GLIDE</span>
        </a>
      </h1>
      <h2 class="text-2xl font-bold mt-4">Welcome Back</h2>
      <p class="text-zinc-500 text-sm">Please log in to your account.</p>
    </div>

    <!-- LOGIN FORM -->
    <form class="space-y-4">
      <input type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border border-zinc-200 outline-none focus:border-[#10B981]">
      
      <div class="relative">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 pe-12 rounded-xl border border-zinc-200 outline-none focus:border-[#10B981]">
        <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-zinc-400" onclick="togglePass('pass')"></i>
      </div>

      <div class="flex items-center justify-between text-xs sm:text-sm gap-2 flex-nowrap">
        <div class="flex items-center gap-1.5 sm:gap-2 shrink-0">
          <input type="checkbox" id="remember" class="accent-[#10B981] shrink-0">
          <label for="remember" class="text-zinc-500 select-none">Remember me</label>
        </div>
        <a href="#" class="text-[#10B981] font-bold shrink-0">Forgot Password?</a>
      </div>
      
      <button class="w-full bg-[#10B981] text-white font-bold py-4 rounded-xl hover:bg-emerald-600 transition">Log In</button>
    </form>

    <!-- SOCIAL LOGIN -->
    <div class="my-4 flex items-center gap-4">
      <div class="flex-grow h-px bg-zinc-200"></div>
      <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Or login with</span>
      <div class="flex-grow h-px bg-zinc-200"></div>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <button class="btn-social flex items-center justify-center gap-2 p-3 border rounded-xl hover:bg-zinc-50 transition font-semibold text-sm">
        <i class="bi bi-google text-red-500 text-lg lg:text-base"></i> <span class="hidden lg:inline">Google</span>
      </button>
      <button class="btn-social flex items-center justify-center gap-2 p-3 border rounded-xl hover:bg-zinc-50 transition font-semibold text-sm">
        <i class="bi bi-facebook text-blue-600 text-lg lg:text-base"></i> <span class="hidden lg:inline">Facebook</span>
      </button>
      <button class="btn-social flex items-center justify-center gap-2 p-3 border rounded-xl hover:bg-zinc-50 transition font-semibold text-sm">
        <i class="bi bi-apple text-lg lg:text-base"></i> <span class="hidden lg:inline">Apple</span>
      </button>
    </div>
    <div class="text-center mt-4 text-sm">
      <p class="text-zinc-500">Don't have an account? <a href="sign.html" class="text-[#10B981] font-bold">Sign Up</a></p>
    </div>
  </div>

  <script>
    function togglePass(id) {
      const input = document.getElementById(id);
      const icon = input.nextElementSibling;
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye-slash", "bi-eye");
      } else {
        input.type = "password";
        icon.classList.replace("bi-eye", "bi-eye-slash");
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleRTL() {
      document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
    }
  </script>
</body>
</html>
